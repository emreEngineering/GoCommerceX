services:
  postgres:
    image: postgres:16-alpine
    container_name: gocommerce-postgres
    environment:
      POSTGRES_USER: gocommerce
      POSTGRES_PASSWORD: gocommerce_password
      POSTGRES_DB: gocommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gocommerce -d gocommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: api-gateway
        SERVICE_NAME: api-gateway
    container_name: gocommerce-api-gateway
    environment:
      HTTP_PORT: 8080
      AUTH_ADDR: auth-service:50051
      USER_ADDR: user-service:50052
      PRODUCT_ADDR: product-service:50053
      INVENTORY_ADDR: inventory-service:50054
      CART_ADDR: cart-service:50055
      ORDER_ADDR: order-service:50056
      PAYMENT_ADDR: payment-service:50057
      NOTIF_ADDR: notification-service:50058
      JWT_SECRET: change-me-in-production
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  auth-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: auth-service
        SERVICE_NAME: auth-service
    container_name: gocommerce-auth-service
    environment:
      GRPC_PORT: 50051
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gocommerce
      DB_PASSWORD: gocommerce_password
      DB_NAME: gocommerce
      JWT_SECRET: change-me-in-production
      USER_SERVICE_ADDR: user-service:50052
    ports:
      - "50051:50051"
    depends_on:
      - postgres

  user-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: user-service
        SERVICE_NAME: user-service
    container_name: gocommerce-user-service
    environment:
      GRPC_PORT: 50052
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gocommerce
      DB_PASSWORD: gocommerce_password
      DB_NAME: gocommerce
    ports:
      - "50052:50052"
    depends_on:
      - postgres

  product-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: product-service
        SERVICE_NAME: product-service
    container_name: gocommerce-product-service
    environment:
      GRPC_PORT: 50053
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gocommerce
      DB_PASSWORD: gocommerce_password
      DB_NAME: gocommerce
    ports:
      - "50053:50053"
    depends_on:
      - postgres

  inventory-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: inventory-service
        SERVICE_NAME: inventory-service
    container_name: gocommerce-inventory-service
    environment:
      GRPC_PORT: 50054
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gocommerce
      DB_PASSWORD: gocommerce_password
      DB_NAME: gocommerce
    ports:
      - "50054:50054"
    depends_on:
      - postgres

  cart-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: cart-service
        SERVICE_NAME: cart-service
    container_name: gocommerce-cart-service
    environment:
      GRPC_PORT: 50055
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      CART_KEY_PREFIX: "cart:"
    ports:
      - "50055:50055"
    depends_on:
      - redis

  order-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: order-service
        SERVICE_NAME: order-service
    container_name: gocommerce-order-service
    environment:
      GRPC_PORT: 50056
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gocommerce
      DB_PASSWORD: gocommerce_password
      DB_NAME: gocommerce
      PAYMENT_SERVICE_ADDR: payment-service:50057
      NOTIFICATION_SERVICE_ADDR: notification-service:50058
    ports:
      - "50056:50056"
    depends_on:
      - postgres

  payment-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: payment-service
        SERVICE_NAME: payment-service
    container_name: gocommerce-payment-service
    environment:
      GRPC_PORT: 50057
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gocommerce
      DB_PASSWORD: gocommerce_password
      DB_NAME: gocommerce
    ports:
      - "50057:50057"
    depends_on:
      - postgres

  notification-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: notification-service
        SERVICE_NAME: notification-service
    container_name: gocommerce-notification-service
    environment:
      GRPC_PORT: 50058
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gocommerce
      DB_PASSWORD: gocommerce_password
      DB_NAME: gocommerce
    ports:
      - "50058:50058"
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: gocommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gocommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: gocommerce
      RABBITMQ_DEFAULT_PASS: gocommerce_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
